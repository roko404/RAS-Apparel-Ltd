/* ================= CSV / Download helpers ================= */
function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function toCSV(rows, headers) {
  const esc = (v) => {
    const s = String(v === undefined || v === null ? "" : v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const lines = [headers.map(esc).join(",")];
  rows.forEach((r) => lines.push(headers.map((h) => esc(r[h])).join(",")));
  return "\uFEFF" + lines.join("\n");
}
async function downloadElementAsPDF_A4(elId, filename) {
  const node = document.getElementById(elId);
  const canvas = await html2canvas(node, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
  const imgData = canvas.toDataURL("image/png");
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: "pt", format: "a4" });
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const imgWidth = pageWidth - 40;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;
  let heightLeft = imgHeight, position = 20;
  pdf.addImage(imgData, "PNG", 20, position, imgWidth, imgHeight);
  heightLeft -= (pageHeight - 40);
  while (heightLeft > 0) {
    position = heightLeft - imgHeight + 20;
    pdf.addPage();
    pdf.addImage(imgData, "PNG", 20, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;
  }
  pdf.save(filename);
}
async function downloadElementAsPDF_Fit(elId, filename) {
  const node = document.getElementById(elId);
  const canvas = await html2canvas(node, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
  const imgData = canvas.toDataURL("image/png");
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: "px", format: [canvas.width, canvas.height] });
  pdf.addImage(imgData, "PNG", 0, 0, canvas.width, canvas.height);
  pdf.save(filename);
}

/* ================= Firestore helpers ================= */
function listenCollection(name, setter) {
  return db.collection(name).onSnapshot((snap) => {
    const rows = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
    rows.sort((a, b) => (b.date || "").localeCompare(a.date || "") || (b._ts || 0) - (a._ts || 0));
    setter(rows);
  }, (err) => console.error(name, "listener error", err));
}
async function fsSet(collectionName, docId, data) {
  await db.collection(collectionName).doc(docId).set({ ...data, _ts: Date.now() }, { merge: true });
}
async function fsDelete(collectionName, docId) {
  await db.collection(collectionName).doc(docId).delete();
}
async function fsIncrementStock(productId, delta) {
  await db.collection("products").doc(productId).update({ stock: firebase.firestore.FieldValue.increment(delta) });
}
async function batchWrite(collectionName, rows) {
  let batch = db.batch(); let count = 0;
  for (const row of rows) {
    const ref = db.collection(collectionName).doc(row.id || uid());
    batch.set(ref, { ...row, _ts: row._ts || Date.now() }, { merge: true });
    count++;
    if (count === 400) { await batch.commit(); batch = db.batch(); count = 0; }
  }
  if (count > 0) await batch.commit();
}

function BarcodeScanModal({ onDetect, onClose }) {
  const videoRef = useRef(null);
  const [error, setError] = useState("");
  const [supported, setSupported] = useState(true);
  const streamRef = useRef(null);
  useEffect(() => {
    let raf, stopped = false;
    async function start() {
      if (!("BarcodeDetector" in window)) { setSupported(false); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        streamRef.current = stream;
        if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); }
        const detector = new window.BarcodeDetector();
        const loop = async () => {
          if (stopped) return;
          try {
            const codes = await detector.detect(videoRef.current);
            if (codes && codes.length > 0) { onDetect(codes[0].rawValue); return; }
          } catch (e) {}
          raf = requestAnimationFrame(loop);
        };
        raf = requestAnimationFrame(loop);
      } catch (e) {
        setError("ক্যামেরা চালু করা যায়নি (পারমিশন দিন অথবা HTTPS লিংক ব্যবহার করুন)। ম্যানুয়ালি লিখুন বা USB স্ক্যানার ব্যবহার করুন।");
      }
    }
    start();
    return () => { stopped = true; cancelAnimationFrame(raf); if (streamRef.current) streamRef.current.getTracks().forEach((t) => t.stop()); };
  }, []);
  return (
    <Modal title="📷 বারকোড স্ক্যান করুন" onClose={onClose}>
      {supported ? (
        <div>
          {error ? <div className="text-sm text-[#C0392B] bg-[#FBEAE8] rounded-lg p-3">⚠️ {error}</div> : (
            <div className="rounded-xl overflow-hidden bg-black aspect-video relative">
              <video ref={videoRef} className="w-full h-full object-cover" muted playsInline />
              <div className="absolute inset-x-8 top-1/2 -translate-y-1/2 h-0.5 bg-[#C9A24B]" />
            </div>
          )}
          <p className="text-xs text-[#6B6B70] mt-3">বারকোডটি ফ্রেমের মধ্যে ধরুন। স্বয়ংক্রিয়ভাবে শনাক্ত হবে।</p>
        </div>
      ) : (
        <div className="text-sm text-[#6B6B70] bg-[#F7F6F2] rounded-lg p-4">এই ব্রাউজারে ক্যামেরা স্ক্যান সাপোর্ট নেই। USB/ব্লুটুথ বারকোড স্ক্যানার দিয়ে সরাসরি ইনপুট ফিল্ডে স্ক্যান করুন, অথবা কোডটি ম্যানুয়ালি টাইপ করুন।</div>
      )}
    </Modal>
  );
}

function StatusBadge({ value }) {

    Pending: "#B08D57", "In Production": "#1E3A5F", QC: "#8E5FC7", Shipped: "#2F855A", Completed: "#2F855A", Cancelled: "#C0392B",
    Pass: "#2F855A", Fail: "#C0392B", Done: "#2F855A", Delayed: "#C0392B",
    Booked: "#B08D57", "In Transit": "#1E3A5F", Delivered: "#2F855A",
    Admin: "#C9A24B", Merchandiser: "#1E3A5F", Production: "#8E5FC7", Viewer: "#6B6B70",
  };
  const c = colorMap[value] || "#6B6B70";

function exportModuleCSV(items, headers, filename) {
  const rows = items.map((it) => { const r = {}; headers.forEach((h) => (r[h] = it[h])); return r; });
  downloadBlob(toCSV(rows, headers), filename, "text/csv;charset=utf-8;");
}
function exportModuleXLSX(items, headers, sheetName, filename) {
  const rows = items.map((it) => { const r = {}; headers.forEach((h) => (r[h.key || h] = it[h.key || h])); return r; });
  const ws = XLSX.utils.json_to_sheet(rows, { header: headers.map((h) => h.key || h) });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, filename);
}

function GenericModal({ title, fields, initial, onSave, onClose }) {
  const [form, setForm] = useState(() => {
    const base = { id: (initial && initial.id) || uid() };
    fields.forEach((f) => { base[f.key] = initial ? (initial[f.key] !== undefined ? initial[f.key] : "") : (f.type === "select" ? (f.options ? f.options[0] : "") : ""); });
    return base;
  });
  function set(k, v) { setForm((f) => ({ ...f, [k]: v })); }
  function submit(e) { e.preventDefault(); onSave(form); }
  return (
    <Modal title={title} onClose={onClose}>
      <form onSubmit={submit} className="space-y-3">
        {fields.map((f) => (
          <Field key={f.key} label={f.label}>
            {f.type === "select" ? (
              <select value={form[f.key]} onChange={(e) => set(f.key, e.target.value)} className="input">
                {f.options.map((o) => <option key={o} value={o}>{o}</option>)}
              </select>
            ) : f.type === "textarea" ? (
              <textarea value={form[f.key]} onChange={(e) => set(f.key, e.target.value)} className="input" rows={3} />
            ) : f.type === "autocomplete" ? (
              <React.Fragment>
                <input list={f.datalistId} value={form[f.key]} onChange={(e) => set(f.key, e.target.value)} className="input" required={!!f.required} placeholder={f.placeholder} />
                <datalist id={f.datalistId}>
                  {(f.options || []).map((o) => <option key={o} value={o} />)}
                </datalist>
                {f.hint && <div className="text-[10px] text-[#9A9A9E] mt-0.5">{f.hint}</div>}
              </React.Fragment>
            ) : (
              <input type={f.type || "text"} value={form[f.key]} onChange={(e) => set(f.key, e.target.value)} className="input" required={!!f.required} />
            )}
          </Field>
        ))}
        <button type="submit" className="w-full bg-[#0B0B0C] text-white py-2.5 rounded-lg font-medium hover:bg-[#1a1a1c] mt-2">সংরক্ষণ করুন</button>
      </form>
    </Modal>
  );
}

    if (!user) {
      setProducts([]); setPurchases([]); setInvoices([]); setExpenses([]);
      setBuyers([]); setFactories([]); setSuppliers([]); setStyles([]); setPurchaseOrders([]);
      setProductionEntries([]); setQcInspections([]); setTaMilestones([]); setCostings([]);
      return;
    }
    setDataLoading(true);
    const uns = [
      listenCollection("products", setProducts),
      listenCollection("purchases", setPurchases),
      listenCollection("invoices", setInvoices),
      listenCollection("expenses", setExpenses),
      listenCollection("buyers", setBuyers),
      listenCollection("factories", setFactories),
      listenCollection("suppliers", setSuppliers),
      listenCollection("styles", setStyles),
      listenCollection("purchaseOrders", setPurchaseOrders),
      listenCollection("productionEntries", setProductionEntries),
      listenCollection("qcInspections", setQcInspections),
      listenCollection("taMilestones", setTaMilestones),
      listenCollection("costings", setCostings),
    ];
    setDataLoading(false);
    return () => { uns.forEach((u) => u()); };
  }, [user]);

  function handleLogin(e) {
    e.preventDefault();
    setLoginErr("");
    auth.signInWithEmailAndPassword(email, pw).catch((err) => {
      const map = { "auth/invalid-credential": "ইমেইল বা পাসওয়ার্ড সঠিক নয়।", "auth/user-not-found": "এই ইমেইলে কোনো অ্যাকাউন্ট নেই। অ্যাডমিনকে জানান।", "auth/wrong-password": "পাসওয়ার্ড সঠিক নয়।", "auth/too-many-requests": "অনেকবার চেষ্টা হয়েছে, কিছুক্ষণ পর আবার চেষ্টা করুন।" };
      setLoginErr(map[err.code] || ("লগইন ব্যর্থ হয়েছে: " + err.message));
    });
  }

  async function saveProduct(prod) { await fsSet("products", prod.id, { ...prod, updatedBy: user.email }); setProductModal(null); showToast("প্রোডাক্ট সংরক্ষিত হয়েছে"); }
  async function deleteProduct(id) { await fsDelete("products", id); showToast("প্রোডাক্ট মুছে ফেলা হয়েছে"); }

  async function recordPurchase(entry) {
    await fsSet("purchases", entry.id, { ...entry, createdBy: user.email });
    await fsIncrementStock(entry.productId, entry.qty);
    showToast("ক্রয় রেকর্ড করা হয়েছে");
  }
  async function recordInvoice(inv) {
    await fsSet("invoices", inv.id, { ...inv, createdBy: user.email });
    for (const item of inv.items) await fsIncrementStock(item.productId, -item.qty);
    showToast("ইনভয়েস তৈরি হয়েছে");
    setAutoDownload(true);
    setViewInvoice(inv);
  }
  async function addExpense(exp) { await fsSet("expenses", exp.id, { ...exp, createdBy: user.email }); showToast("খরচ যোগ করা হয়েছে"); }
  async function deleteExpense(id) { await fsDelete("expenses", id); }

  async function genericSave(collectionName, data) { await fsSet(collectionName, data.id, { ...data, updatedBy: user.email }); showToast("সংরক্ষণ করা হয়েছে"); }

  async function ensureMasterRecord(collectionName, list, name) {
    const trimmed = (name || "").trim();
    if (!trimmed) return;
    const exists = list.some((it) => (it.name || "").trim().toLowerCase() === trimmed.toLowerCase());
    if (!exists) {
      const record = collectionName === "styles" ? { name: trimmed, styleNumber: trimmed } : { name: trimmed };
      await fsSet(collectionName, uid(), { ...record, updatedBy: user.email, autoCreated: true });
    }
  }
  async function savePurchaseOrder(data) {
    await fsSet("purchaseOrders", data.id, { ...data, updatedBy: user.email });
    await ensureMasterRecord("buyers", buyers, data.buyerName);
    await ensureMasterRecord("factories", factories, data.factoryName);
    await ensureMasterRecord("styles", styles, data.styleName);
    showToast("PO সংরক্ষণ করা হয়েছে ও লিংকড তালিকা আপডেট হয়েছে");
  }
  async function genericDelete(collectionName, id) { await fsDelete(collectionName, id); showToast("মুছে ফেলা হয়েছে"); }

  async function changePassword(oldPw, newPw) {
    try {
      const cred = firebase.auth.EmailAuthProvider.credential(user.email, oldPw);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(newPw);
      return true;
    } catch (e) { return false; }
  }

  function exportJSON() {
    const backup = {
      products, purchases, invoices, expenses,
      buyers, factories, suppliers, styles, purchaseOrders,
      productionEntries, qcInspections, taMilestones, costings,
      exportedAt: new Date().toISOString(), company: COMPANY.name,
    };
    downloadBlob(JSON.stringify(backup, null, 2), `ras-apparel-backup-${todayStr()}.json`, "application/json");
    showToast("ব্যাকআপ ডাউনলোড হয়েছে");
  }
  function importJSON(file) {
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const data = JSON.parse(reader.result);
        if (!confirm("ব্যাকআপের ডেটা বর্তমান ডেটার সাথে মার্জ (add/update) করা হবে। এগোতে চান?")) return;
        const collections = { products: "products", purchases: "purchases", invoices: "invoices", expenses: "expenses",
          buyers: "buyers", factories: "factories", suppliers: "suppliers", styles: "styles", purchaseOrders: "purchaseOrders",
          productionEntries: "productionEntries", qcInspections: "qcInspections", taMilestones: "taMilestones", costings: "costings",
        };
        for (const key of Object.keys(collections)) {
          if (data[key]) await batchWrite(collections[key], data[key]);
        }
        showToast("ব্যাকআপ পুনরুদ্ধার হয়েছে");
      } catch (e) { alert("ফাইলটি সঠিক নয়। JSON ব্যাকআপ ফাইল আপলোড করুন।"); }
    };
    reader.readAsText(file);
  }

  const totalPurchaseCost = purchases.reduce((s, p) => s + (p.total || 0), 0);
  const totalSalesRevenue = invoices.reduce((s, i) => s + (i.grandTotal || 0), 0);
  const totalExpenses = expenses.reduce((s, e) => s + Number(e.amount || 0), 0);
  const totalStockValue = products.reduce((s, p) => s + (p.stock || 0) * (p.purchasePrice || 0), 0);
  const totalStockUnits = products.reduce((s, p) => s + (p.stock || 0), 0);
  const totalCost = totalPurchaseCost + totalExpenses;
  const netProfit = totalSalesRevenue - totalCost;
  const lowStock = products.filter((p) => (p.stock || 0) <= (p.reorderLevel || 5));

  const buyerNames = buyers.map((b) => b.name).filter(Boolean);
  const factoryNames = factories.map((f) => f.name).filter(Boolean);
  const styleNames = styles.map((s) => s.name).filter(Boolean);
  const poNumbers = purchaseOrders.map((p) => p.poNumber).filter(Boolean);

  const navGroups = [
    { label: "ড্যাশবোর্ড", items: [
      { id: "dashboard", label: "ড্যাশবোর্ড", icon: "📊" },
    ]},
    { label: "অর্ডার ম্যানেজমেন্ট", items: [
      { id: "purchaseOrders", label: "Purchase Orders", icon: "📑" },
      { id: "styles", label: "Styles", icon: "👕" },
      { id: "buyers", label: "Buyers", icon: "🧑‍💼" },
    ]},
    { label: "উৎপাদন", items: [
      { id: "production", label: "Production Tracking", icon: "⚙️" },
      { id: "qc", label: "Quality Control", icon: "✅" },
      { id: "ta", label: "T&A / Critical Path", icon: "🗓️" },
    ]},
    { label: "সাপ্লাই চেইন", items: [
      { id: "factories", label: "Factories", icon: "🏭" },
      { id: "suppliers", label: "Suppliers", icon: "🚚" },
    ]},
    { label: "বাণিজ্যিক", items: [
      { id: "costing", label: "Costing", icon: "💵" },
    ]},
    { label: "ইনভেন্টরি ও POS", items: [
      { id: "products", label: "প্রোডাক্ট", icon: "📦" },
      { id: "purchase", label: "ক্রয় (কাঁচামাল)", icon: "🧱" },
      { id: "sale", label: "বিক্রয় (POS)", icon: "🛒" },
      { id: "invoices", label: "ইনভয়েস", icon: "🧾" },
      { id: "expenses", label: "খরচ", icon: "💰" },
    ]},
    { label: "রিপোর্ট ও প্রশাসন", items: [
      { id: "reports", label: "রিপোর্ট", icon: "⬇️" },
      { id: "settings", label: "সেটিংস", icon: "⚙️" },
    ]},
  ];
  const navItemsFlat = navGroups.reduce((acc, g) => acc.concat(g.items), []);

  if (!isConfigured) return <NotConfiguredScreen />;

  if (authLoading) {
    return <div className="min-h-screen flex items-center justify-center bg-[#0B0B0C]"><div className="text-white/60 text-sm">লোড হচ্ছে...</div></div>;
  }

  if (!user) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-[#0B0B0C] p-6">
        <div className="relative bg-white rounded-2xl border border-[#2A2A2E] max-w-sm w-full p-8 shadow-2xl">
          <div className="text-center mb-6">
            <img src={LOGO_BASE64} alt={COMPANY.name} className="h-20 mx-auto mb-3 object-contain" />
            <div className="text-[11px] tracking-[0.15em] text-[#9A9A9E] mt-1">{COMPANY.tagline}</div>
          </div>
          <RulerDivider />
          <form onSubmit={handleLogin} className="space-y-4">
            <Field label="ইমেইল">
              <div className="flex items-center gap-2 bg-white rounded-lg border border-[#E7E2D8] px-3 py-2.5">
                ✉️<input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="flex-1 outline-none text-sm bg-transparent" placeholder="staff@rasapparel.com" required autoFocus />
              </div>
            </Field>
            <Field label="পাসওয়ার্ড">
              <div className="flex items-center gap-2 bg-white rounded-lg border border-[#E7E2D8] px-3 py-2.5">
                🔒<input type="password" value={pw} onChange={(e) => setPw(e.target.value)} className="flex-1 outline-none text-sm bg-transparent" placeholder="পাসওয়ার্ড" required />
              </div>
            </Field>
            {loginErr && <div className="text-xs text-[#C0392B]">{loginErr}</div>}
            <button type="submit" className="w-full bg-[#0B0B0C] hover:bg-[#1a1a1c] text-white font-medium py-2.5 rounded-lg transition-colors">লগইন করুন</button>
            <div className="text-center text-[10px] text-[#9A9A9E]">অ্যাকাউন্ট নেই? Firebase Console থেকে অ্যাডমিন আপনাকে যোগ করবেন।</div>
          </form>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-[#F7F6F2] text-[#17171A]">
      {toast && <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] bg-[#0B0B0C] text-white text-sm px-4 py-2 rounded-full shadow-lg">✓ {toast}</div>}
      <div className="flex">
        <aside className="hidden md:flex md:flex-col w-64 shrink-0 h-screen bg-[#0B0B0C] text-white sticky top-0">
          <div className="p-5 border-b border-white/10 shrink-0">
            <img src={LOGO_BASE64} alt={COMPANY.name} className="h-10 object-contain mb-1" />
            <div className="text-[10px] tracking-[0.15em] text-white/40">{COMPANY.tagline}</div>
          </div>
          <nav className="flex-1 py-4 px-3 overflow-y-auto space-y-4">
            {navGroups.map((group) => (
              <div key={group.label}>
                <div className="px-3 mb-1 text-[10px] uppercase tracking-wider text-white/30 font-semibold">{group.label}</div>
                <div className="space-y-1">
                  {group.items.map((item) => (
                    <button key={item.id} onClick={() => setPage(item.id)}
                      className={"w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors " + (page === item.id ? "bg-[#C9A24B] text-[#0B0B0C] font-medium" : "text-white/70 hover:bg-white/5 hover:text-white")}>
                      <span>{item.icon}</span>{item.label}
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </nav>
          <div className="px-3 py-2 text-[11px] text-white/40 truncate shrink-0" title={user.email}>👤 {user.email}</div>
          <button onClick={() => auth.signOut()} className="m-3 flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/5 hover:text-white shrink-0">🚪 লগআউট</button>
        </aside>

        <main className="flex-1 min-h-screen pb-24 md:pb-8">
          <header className="md:hidden sticky top-0 z-30 bg-[#0B0B0C] text-white px-4 py-3 flex items-center justify-between">
            <img src={LOGO_BASE64} alt={COMPANY.name} className="h-7 object-contain" />
            <button onClick={() => auth.signOut()} className="p-1.5">🚪</button>
          </header>
          <div className="p-4 md:p-8 max-w-6xl mx-auto">
            {dataLoading ? <div className="text-sm text-[#9A9A9E]">ডেটা লোড হচ্ছে...</div> : (
              <React.Fragment>
                {page === "dashboard" && <DashboardPage {...{ products, totalStockUnits, totalStockValue, totalPurchaseCost, totalSalesRevenue, totalExpenses, totalCost, netProfit, lowStock }} />}
                {page === "products" && <ProductsPage products={products} search={search} setSearch={setSearch} onAdd={() => setProductModal("new")} onEdit={setProductModal} onDelete={deleteProduct} />}
                {page === "purchase" && <PurchasePage products={products} purchases={purchases} onSubmit={recordPurchase} onScan={setScanTarget} />}
                {page === "sale" && <SalePage products={products} onSubmit={recordInvoice} onScan={setScanTarget} />}
                {page === "invoices" && <InvoicesPage invoices={invoices} onView={(inv) => { setAutoDownload(false); setViewInvoice(inv); }} />}
                {page === "expenses" && <ExpensesPage expenses={expenses} onAdd={addExpense} onDelete={deleteExpense} totalExpenses={totalExpenses} />}
                {page === "buyers" && <GenericListPage title="বায়ার (Buyers)" icon="🧑‍💼" fields={BUYER_FIELDS} listColumns={BUYER_COLUMNS} items={buyers} onSave={(d) => genericSave("buyers", d)} onDelete={(id) => genericDelete("buyers", id)} />}
                {page === "factories" && <GenericListPage title="ফ্যাক্টরি (Factories)" icon="🏭" fields={FACTORY_FIELDS} listColumns={FACTORY_COLUMNS} items={factories} onSave={(d) => genericSave("factories", d)} onDelete={(id) => genericDelete("factories", id)} />}
                {page === "suppliers" && <GenericListPage title="সাপ্লায়ার (Suppliers)" icon="🚚" fields={SUPPLIER_FIELDS} listColumns={SUPPLIER_COLUMNS} items={suppliers} onSave={(d) => genericSave("suppliers", d)} onDelete={(id) => genericDelete("suppliers", id)} />}
                {page === "styles" && <GenericListPage title="স্টাইল (Styles)" icon="👕" fields={STYLE_FIELDS} listColumns={STYLE_COLUMNS} items={styles} onSave={(d) => genericSave("styles", d)} onDelete={(id) => genericDelete("styles", id)} onExportExcel={() => exportModuleXLSX(styles, ["styleNumber", "name", "category", "season", "sizes", "colors", "unitPrice", "notes"], "Styles", `styles-${todayStr()}.xlsx`)} />}
                {page === "purchaseOrders" && <GenericListPage title="Purchase Orders" icon="📑" fields={buildPOFields(buyerNames, styleNames, factoryNames)} listColumns={PO_COLUMNS} items={purchaseOrders} onSave={savePurchaseOrder} onDelete={(id) => genericDelete("purchaseOrders", id)} />}
                {page === "production" && <GenericListPage title="উৎপাদন ট্র্যাকিং" icon="⚙️" fields={buildProductionFields(poNumbers, factoryNames)} listColumns={PRODUCTION_COLUMNS} items={productionEntries} onSave={(d) => genericSave("productionEntries", d)} onDelete={(id) => genericDelete("productionEntries", id)} />}
                {page === "qc" && <GenericListPage title="Quality Control" icon="✅" fields={buildQCFields(poNumbers)} listColumns={QC_COLUMNS} items={qcInspections} onSave={(d) => genericSave("qcInspections", d)} onDelete={(id) => genericDelete("qcInspections", id)} />}
                {page === "ta" && <GenericListPage title="T\u0026A / Critical Path" icon="🗓️" fields={buildTAFields(poNumbers)} listColumns={TA_COLUMNS} items={taMilestones} onSave={(d) => genericSave("taMilestones", d)} onDelete={(id) => genericDelete("taMilestones", id)} />}
                {page === "costing" && <GenericListPage title="কস্টিং (Costing)" icon="💵" fields={COSTING_FIELDS} listColumns={COSTING_COLUMNS} items={costings} onSave={(d) => genericSave("costings", d)} onDelete={(id) => genericDelete("costings", id)} />}
                {page === "reports" && <ReportsPage products={products} purchases={purchases} invoices={invoices} expenses={expenses} buyers={buyers} factories={factories} suppliers={suppliers} styles={styles} purchaseOrders={purchaseOrders} productionEntries={productionEntries} qcInspections={qcInspections} taMilestones={taMilestones} costings={costings} stats={{ totalStockUnits, totalStockValue, totalPurchaseCost, totalSalesRevenue, totalExpenses, totalCost, netProfit }} onExportJSON={exportJSON} onImportJSON={importJSON} />}
                {page === "settings" && <SettingsPage onChangePassword={changePassword} showToast={showToast} productsCount={products.length} userEmail={user.email} />}
              </React.Fragment>
            )}
          </div>
        </main>
      </div>

      <nav className="md:hidden fixed bottom-0 inset-x-0 z-30 bg-[#0B0B0C] flex items-center py-2 px-1 border-t border-white/10 overflow-x-auto">
        {navItemsFlat.map((item) => (
          <button key={item.id} onClick={() => setPage(item.id)} className={"flex flex-col items-center gap-0.5 px-2 py-1 rounded-lg text-[10px] shrink-0 " + (page === item.id ? "text-[#C9A24B]" : "text-white/60")}>
            <span className="text-base">{item.icon}</span>{item.label}
          </button>
        ))}
      </nav>

      {productModal && <ProductModal initial={productModal === "new" ? null : productModal} onClose={() => setProductModal(null)} onSave={saveProduct} onScan={setScanTarget} />}
      {scanTarget && <BarcodeScanModal onClose={() => setScanTarget(null)} onDetect={(val) => { scanTarget(val); setScanTarget(null); }} />}
      {viewInvoice && <InvoiceViewModal invoice={viewInvoice} autoDownload={autoDownload} onClose={() => { setViewInvoice(null); setAutoDownload(false); }} />}
    </div>
  );
}

/* ================= Dashboard ================= */
function StatCard({ icon, label, value, tint }) {
  return (
    <div className="bg-white rounded-xl border border-[#EFEAE0] p-4 flex items-start gap-3">
      <div className="p-2.5 rounded-lg shrink-0 text-lg" style={{ background: tint + "1F" }}>{icon}</div>
      <div className="min-w-0">
        <div className="text-xs text-[#6B6B70] truncate">{label}</div>
        <div className="text-lg font-bold text-[#17171A] mt-0.5 truncate">{value}</div>
      </div>
    </div>
  );
}
function DashboardPage({ products, totalStockUnits, totalStockValue, totalPurchaseCost, totalSalesRevenue, totalExpenses, totalCost, netProfit, lowStock }) {
  return (
    <div>
      <h1 className="text-3xl font-bold display-font">ড্যাশবোর্ড</h1>
      <RulerDivider />
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
        <StatCard icon="📦" label="মোট প্রোডাক্ট" value={products.length} tint="#0B0B0C" />
        <StatCard icon="🧱" label="মোট স্টক (ইউনিট)" value={totalStockUnits} tint="#C9A24B" />
        <StatCard icon="💸" label="মোট ক্রয় খরচ" value={money(totalPurchaseCost)} tint="#C0392B" />
        <StatCard icon="📈" label="মোট বিক্রয়" value={money(totalSalesRevenue)} tint="#2F855A" />
        <StatCard icon="💰" label="অন্যান্য খরচ" value={money(totalExpenses)} tint="#C9A24B" />
        <StatCard icon="🧮" label="টোটাল খরচ" value={money(totalCost)} tint="#C0392B" />
        <StatCard icon={netProfit >= 0 ? "📈" : "📉"} label="নিট লাভ/ক্ষতি" value={money(netProfit)} tint={netProfit >= 0 ? "#2F855A" : "#C0392B"} />
        <StatCard icon="🏷️" label="স্টক মূল্য (ক্রয়মূল্যে)" value={money(totalStockValue)} tint="#0B0B0C" />
      </div>
      <div className="bg-white rounded-xl border border-[#EFEAE0] p-5">
        <div className="flex items-center gap-2 mb-3"><span>⚠️</span><h2 className="font-semibold">লো স্টক সতর্কতা</h2></div>
        {lowStock.length === 0 ? <div className="text-sm text-[#6B6B70]">সব প্রোডাক্টের স্টক পর্যাপ্ত আছে।</div> : (
          <div className="space-y-2">
            {lowStock.map((p) => (
              <div key={p.id} className="flex items-center justify-between text-sm bg-[#FBEAE8] rounded-lg px-3 py-2">
                <span>{p.name}</span><span className="font-semibold text-[#C0392B]">{p.stock} {p.unit || "pcs"}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ================= Products ================= */
function ProductsPage({ products, search, setSearch, onAdd, onEdit, onDelete }) {
  const filtered = products.filter((p) => p.name.toLowerCase().includes(search.toLowerCase()) || (p.barcode || "").includes(search) || (p.category || "").toLowerCase().includes(search.toLowerCase()));
  return (
    <div>
      <div className="flex items-center justify-between flex-wrap gap-3">
        <h1 className="text-3xl font-bold display-font">প্রোডাক্ট লিস্ট</h1>

/* ================= Product Picker ================= */
function ProductPicker({ products, onPick, onScan }) {
  const [q, setQ] = useState("");
  const matches = q.length > 0 ? products.filter((p) => p.name.toLowerCase().includes(q.toLowerCase()) || (p.barcode || "") === q) : [];
  function tryBarcodeExact(val) { const found = products.find((p) => p.barcode === val); if (found) { onPick(found); setQ(""); } }
  return (
    <div className="relative">
      <div className="flex gap-2">
        <input value={q} onChange={(e) => setQ(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); tryBarcodeExact(q); } }}
          placeholder="প্রোডাক্ট খুঁজুন বা বারকোড স্ক্যান করুন (স্ক্যানারের পর Enter)" className="input flex-1" />
        <button type="button" onClick={() => onScan(() => (val) => tryBarcodeExact(val))} className="bg-[#0B0B0C] text-white px-3 rounded-lg">📷</button>
      </div>
      {matches.length > 0 && (
        <div className="absolute z-20 mt-1 w-full bg-white border border-[#EFEAE0] rounded-lg shadow-lg max-h-56 overflow-y-auto">
          {matches.map((p) => (
            <button type="button" key={p.id} onClick={() => { onPick(p); setQ(""); }} className="w-full text-left px-3 py-2 hover:bg-[#F7F6F2] text-sm flex justify-between">
              <span>{p.name}</span><span className="text-[#6B6B70]">স্টক: {p.stock || 0}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ================= Sale / POS ================= */
function SalePage({ products, onSubmit, onScan }) {
  const [cart, setCart] = useState([]);
  const [customer, setCustomer] = useState(""); const [phone, setPhone] = useState(""); const [date, setDate] = useState(todayStr());
  function addToCart(p) {
    setCart((c) => {
      const existing = c.find((i) => i.productId === p.id);
      if (existing) return c.map((i) => (i.productId === p.id ? { ...i, qty: i.qty + 1 } : i));
      return [...c, { productId: p.id, name: p.name, qty: 1, price: p.salePrice || 0, maxStock: p.stock || 0 }];
    });
  }
  function updateItem(productId, field, val) { setCart((c) => c.map((i) => (i.productId === productId ? { ...i, [field]: Number(val) || 0 } : i))); }
  function removeItem(productId) { setCart((c) => c.filter((i) => i.productId !== productId)); }
  const grandTotal = cart.reduce((s, i) => s + i.qty * i.price, 0);
  function submit(e) {
    e.preventDefault();
    if (cart.length === 0) return;
    const overStock = cart.find((i) => i.qty > i.maxStock);
    if (overStock) { alert(`"${overStock.name}" এর স্টক পর্যাপ্ত নেই (উপলব্ধ: ${overStock.maxStock})`); return; }
    const invoiceNo = "INV" + Date.now().toString().slice(-8);
    onSubmit({ id: uid(), invoiceNo, date, customer: customer || "ওয়াক-ইন কাস্টমার", phone, items: cart.map(({ productId, name, qty, price }) => ({ productId, name, qty, price, total: qty * price })), grandTotal });
    setCart([]); setCustomer(""); setPhone("");
  }
  return (
    <div>
      <h1 className="text-3xl font-bold display-font">বিক্রয় (POS) ও ইনভয়েস</h1>
      <RulerDivider />
      <div className="grid lg:grid-cols-5 gap-6">
        <div className="lg:col-span-3 bg-white rounded-xl border border-[#EFEAE0] p-5">
          <Field label="প্রোডাক্ট যোগ করুন"><ProductPicker products={products} onPick={addToCart} onScan={onScan} /></Field>
          <div className="mt-4 divide-y divide-[#F7F6F2]">
            {cart.length === 0 && <div className="text-sm text-[#9A9A9E] py-6 text-center">কার্টে কোনো প্রোডাক্ট নেই</div>}
            {cart.map((item) => (
              <div key={item.productId} className="py-3 flex items-center gap-2">
                <div className="flex-1 min-w-0"><div className="text-sm font-medium truncate">{item.name}</div><div className="text-xs text-[#9A9A9E]">স্টক আছে: {item.maxStock}</div></div>
                <input type="number" value={item.qty} onChange={(e) => updateItem(item.productId, "qty", e.target.value)} className="w-16 input text-center !py-1.5" />
                <input type="number" value={item.price} onChange={(e) => updateItem(item.productId, "price", e.target.value)} className="w-24 input text-right !py-1.5" />
                <div className="w-20 text-right text-sm font-semibold">{money(item.qty * item.price)}</div>
                <button onClick={() => removeItem(item.productId)} className="p-1.5 text-[#C0392B] hover:bg-[#FBEAE8] rounded-lg">🗑️</button>
              </div>
            ))}
          </div>
        </div>
        <form onSubmit={submit} className="lg:col-span-2 bg-white rounded-xl border border-[#EFEAE0] p-5 space-y-3 h-fit">
          <Field label="কাস্টমারের নাম"><input value={customer} onChange={(e) => setCustomer(e.target.value)} className="input" placeholder="ওয়াক-ইন কাস্টমার" /></Field>
          <Field label="ফোন নম্বর"><input value={phone} onChange={(e) => setPhone(e.target.value)} className="input" /></Field>
          <Field label="তারিখ"><input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="input" /></Field>
          <div className="flex justify-between items-center bg-[#F7F6F2] rounded-lg px-3 py-3"><span className="text-sm text-[#6B6B70]">সর্বমোট</span><span className="text-lg font-bold text-[#0B0B0C]">{money(grandTotal)}</span></div>
          <button type="submit" className="w-full bg-[#C9A24B] text-[#0B0B0C] py-2.5 rounded-lg font-semibold hover:bg-[#b78e3e] flex items-center justify-center gap-2">🧾 ইনভয়েস তৈরি ও PDF ডাউনলোড</button>
        </form>
      </div>
    </div>
  );
}

    try { await downloadElementAsPDF_A4("print-area", `${invoice.invoiceNo}-A4.pdf`); }

    setDownloadingPos(true);

  function handlePrintPos() {
    document.body.classList.add("printing-pos");
    const cleanup = () => { document.body.classList.remove("printing-pos"); window.removeEventListener("afterprint", cleanup); };

function ExpensesPage({ expenses, onAdd, onDelete, totalExpenses }) {

  function submit(e) { e.preventDefault(); if (!label.trim() || !amount) return; onAdd({ id: uid(), label, amount: Number(amount), date }); setLabel(""); setAmount(""); }
  return (
    <div>

          <Field label="পরিমাণ (৳) *"><input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} className="input" /></Field>

        </form>
        <div className="lg:col-span-3 bg-white rounded-xl border border-[#EFEAE0] overflow-hidden">
          <div className="px-4 py-3 border-b border-[#EFEAE0] font-semibold text-sm flex justify-between"><span>খরচের তালিকা</span><span className="text-[#C0392B]">{money(totalExpenses)}</span></div>

function ReportsPage({ products, purchases, invoices, expenses, buyers, factories, suppliers, styles, purchaseOrders, productionEntries, qcInspections, taMilestones, costings, stats, onExportJSON, onImportJSON }) {
  const fileRef = useRef(null);

  function exportProductsCSV() {
    const rows = products.map((p) => ({ id: p.id, name: p.name, category: p.category, barcode: p.barcode, purchasePrice: p.purchasePrice, salePrice: p.salePrice, stock: p.stock, unit: p.unit }));
    downloadBlob(toCSV(rows, ["id", "name", "category", "barcode", "purchasePrice", "salePrice", "stock", "unit"]), `products-${todayStr()}.csv`, "text/csv;charset=utf-8;");
  }
  function exportPurchasesCSV() {
    const rows = purchases.map((p) => ({ date: p.date, productName: p.productName, qty: p.qty, unitCost: p.unitCost, total: p.total, supplier: p.supplier || "" }));
    downloadBlob(toCSV(rows, ["date", "productName", "qty", "unitCost", "total", "supplier"]), `purchases-${todayStr()}.csv`, "text/csv;charset=utf-8;");
  }
  function exportSalesCSV() {
    const rows = [];
    invoices.forEach((inv) => inv.items.forEach((it) => rows.push({ invoiceNo: inv.invoiceNo, date: inv.date, customer: inv.customer, phone: inv.phone || "", productName: it.name, qty: it.qty, price: it.price, total: it.total, grandTotal: inv.grandTotal })));

  }
  function exportExpensesCSV() {
    const rows = expenses.map((e) => ({ date: e.date, label: e.label, amount: e.amount }));

            <button onClick={exportExpensesCSV} className="w-full flex items-center justify-between bg-[#F7F6F2] hover:bg-[#EFEAE0] px-4 py-2.5 rounded-lg text-sm"><span>খরচ রিপোর্ট ({expenses.length})</span><span>⬇️</span></button>

  return (
    <div>
      <h1 className="text-3xl font-bold display-font">সেটিংস</h1>
      <RulerDivider />
      <div className="grid md:grid-cols-2 gap-6">
        <div className="bg-white rounded-xl border border-[#EFEAE0] p-5">
          <h2 className="font-semibold mb-3">👤 অ্যাকাউন্ট ও কোম্পানি</h2>
          <div className="text-sm space-y-1 text-[#5A5A5F]">
            <div>লগইন করা আছেন: <b>{userEmail}</b></div>
            <div className="pt-2"><b>{COMPANY.name}</b></div>
            <div>{COMPANY.address}</div><div>{COMPANY.phone}</div><div>{COMPANY.email}</div>
            <div className="pt-2 text-xs text-[#9A9A9E]">মোট প্রোডাক্ট: {productsCount}</div>
            <div className="pt-3 text-xs bg-[#F7F6F2] rounded-lg p-2">ℹ️ নতুন স্টাফ যোগ করতে Firebase Console → Authentication → Add user ব্যবহার করুন।</div>
          </div>
        </div>
        <form onSubmit={submit} className="bg-white rounded-xl border border-[#EFEAE0] p-5 space-y-3 h-fit">
          <h2 className="font-semibold mb-1">🔒 পাসওয়ার্ড পরিবর্তন</h2>
          <Field label="বর্তমান পাসওয়ার্ড"><input type="password" value={oldPw} onChange={(e) => setOldPw(e.target.value)} className="input" required /></Field>
          <Field label="নতুন পাসওয়ার্ড"><input type="password" value={newPw} onChange={(e) => setNewPw(e.target.value)} className="input" required minLength={6} /></Field>
          {msg && <div className="text-xs text-[#C0392B]">{msg}</div>}
          <button type="submit" className="w-full bg-[#0B0B0C] text-white py-2.5 rounded-lg font-medium hover:bg-[#1a1a1c]">পরিবর্তন করুন</button>
        </form>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
